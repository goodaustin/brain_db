<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 Capacity Tracker Dashboard v2</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: var(--bg); color: var(--text); padding: 20px; }
h1 { color: var(--accent); font-size: 1.5em; margin-bottom: 4px; }
.subtitle { color: #8b949e; margin-bottom: 16px; font-size: 0.85em; }
.search { width: 100%; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 1em; margin-bottom: 12px; }
.search::placeholder { color: #484f58; }
.stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; text-align: center; min-width: 120px; }
.stat-n { font-size: 1.6em; font-weight: bold; color: var(--accent); }
.stat-l { font-size: 0.72em; color: #8b949e; margin-top: 2px; }
#results { max-height: calc(100vh - 220px); overflow-y: auto; }
.entry { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
.entry:hover { border-color: var(--accent); }
.entry-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.entry-title { font-weight: bold; color: var(--accent); font-size: 0.95em; }
.entry-meta { font-size: 0.78em; color: #8b949e; }
.entry-rating { padding: 2px 8px; border-radius: 10px; font-size: 0.72em; font-weight: 600; }
.r-buy { background: rgba(63,185,80,0.15); color: var(--green); }
.r-sell { background: rgba(248,81,73,0.15); color: var(--red); }
.r-hold { background: rgba(210,153,34,0.15); color: var(--yellow); }
.entry-notes { font-size: 0.82em; margin-top: 8px; color: #8b949e; line-height: 1.5; display: none; }
.entry.expanded .entry-notes { display: block; }
.entry-detail { font-size: 0.82em; margin-top: 8px; line-height: 1.6; display: none; white-space: pre-wrap; word-break: break-word; }
.entry.expanded .entry-detail { display: block; }
mark { background: rgba(88,166,255,0.3); color: var(--text); border-radius: 2px; padding: 0 2px; }
#loading { text-align: center; padding: 40px; color: #8b949e; }
</style>
</head>
<body>
<h1>🧬 Capacity Tracker Dashboard v2</h1>
<p class="subtitle">82 reports processed | 88 data entries | Precedent (Dec 2025 ~ Mar 2026) + Latest (Mar 31) | by 龍蝦小A</p>

<div class="stats">
<div class="stat"><div class="stat-n" id="s-total">-</div><div class="stat-l">Total Entries</div></div>
<div class="stat"><div class="stat-n" id="s-shown">-</div><div class="stat-l">Showing</div></div>
</div>

<input type="text" class="search" id="searchBox" placeholder="🔍 Search: ticker, company, broker, keyword (TSMC, memory, CoWoS, DDR4, liquid cooling...)" autofocus>

<div id="loading">Loading data...</div>
<div id="results"></div>

<script>
let DATA = [];

async function loadData() {
  try {
    const resp = await fetch('master-data.json');
    const master = await resp.json();
    DATA = master.data || master;
    document.getElementById('s-total').textContent = DATA.length;
    document.getElementById('loading').style.display = 'none';
    search('');
  } catch(e) {
    document.getElementById('loading').textContent = 'Error loading data: ' + e.message;
  }
}

function getRatingClass(entry) {
  var s = JSON.stringify(entry).toLowerCase();
  if (s.includes('"buy"') || s.includes('"ow"') || s.includes('"overweight"') || s.includes('"add"') || s.includes('"top pick"') || s.includes('"買進"')) return 'r-buy';
  if (s.includes('"uw"') || s.includes('"underweight"') || s.includes('"sell"')) return 'r-sell';
  if (s.includes('"neutral"') || s.includes('"ew"') || s.includes('"equal-weight"') || s.includes('"hold"')) return 'r-hold';
  return '';
}

function getField(e) {
  var fields = arguments;
  for (var i = 1; i < fields.length; i++) {
    if (e[fields[i]]) return String(e[fields[i]]);
  }
  return '';
}

function getTitle(e) { return getField(e, 'company', 'company_name', 'Company', 'ticker', 'company_ticker', 'Company ticker+name', 'name') || 'Unknown'; }
function getRating(e) { return getField(e, 'rating', 'Rating'); }
function getTP(e) { return getField(e, 'tp', 'target_price', 'price_target', 'TP'); }
function getBroker(e) { return getField(e, 'broker', 'Broker', 'broker_source'); }
function getDate(e) { return getField(e, 'date', 'Date', 'report_date'); }

function flattenObj(obj, prefix) {
  var lines = [];
  if (!obj) return lines;
  var keys = Object.keys(obj);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i], v = obj[k];
    var p = prefix ? prefix + '.' + k : k;
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      lines = lines.concat(flattenObj(v, p));
    } else if (Array.isArray(v)) {
      lines.push(p + ': ' + v.join(', '));
    } else if (v !== null && v !== undefined && v !== '') {
      lines.push(p + ': ' + v);
    }
  }
  return lines;
}

function getKeyNotes(e) {
  if (e.key_notes) {
    if (Array.isArray(e.key_notes)) return e.key_notes.join(' ');
    return String(e.key_notes);
  }
  return '';
}

function hl(text, q) {
  if (!q || !text) return String(text);
  var words = q.split(/\s+/).filter(function(w){return w.length>0;});
  var result = String(text);
  words.forEach(function(w) {
    var re = new RegExp('(' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

function renderEntry(e, q) {
  var title = getTitle(e);
  var rating = getRating(e);
  var tp = getTP(e);
  var broker = getBroker(e);
  var date = getDate(e);
  var rc = getRatingClass(e);
  var notes = getKeyNotes(e);
  var details = flattenObj(e, '');
  
  var h = '<div class="entry" onclick="this.classList.toggle('expanded')">';
  h += '<div class="entry-header">';
  h += '<div><span class="entry-title">' + hl(title,q) + '</span>';
  if (broker) h += ' <span class="entry-meta">' + hl(broker,q) + '</span>';
  if (date) h += ' <span class="entry-meta">' + date + '</span>';
  h += '</div><div>';
  if (rating) h += '<span class="entry-rating ' + rc + '">' + hl(rating,q) + '</span> ';
  if (tp) h += '<span style="color:var(--yellow);font-size:0.8em">TP: ' + tp + '</span>';
  h += '</div></div>';
  if (notes) h += '<div class="entry-notes">' + hl(notes,q) + '</div>';
  h += '<div class="entry-detail">' + details.map(function(d){return hl(d,q);}).join('\n') + '</div>';
  h += '</div>';
  return h;
}

function search(q) {
  var ql = q.toLowerCase();
  var filtered = DATA;
  if (ql.trim()) {
    var words = ql.split(/\s+/).filter(function(w){return w.length>0;});
    filtered = DATA.filter(function(e) {
      var s = JSON.stringify(e).toLowerCase();
      return words.every(function(w){return s.includes(w);});
    });
  }
  document.getElementById('s-shown').textContent = filtered.length;
  var container = document.getElementById('results');
  if (filtered.length === 0) {
    container.innerHTML = '<p style="color:#8b949e;text-align:center;padding:40px">No results found</p>';
    return;
  }
  container.innerHTML = filtered.map(function(e){return renderEntry(e, q);}).join('');
}

document.getElementById('searchBox').addEventListener('input', function() { search(this.value); });
loadData();
</script>
</body>
</html>
