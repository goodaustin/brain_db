function getRatingClass(entry) {
  const s = JSON.stringify(entry).toLowerCase();
  if (s.includes('"buy"') || s.includes('"ow"') || s.includes('"overweight"') || s.includes('"add"') || s.includes('"增加持股"') || s.includes('"買進"') || s.includes('"top pick"')) return 'r-buy';
  if (s.includes('"uw"') || s.includes('"underweight"') || s.includes('"sell"') || s.includes('"reduce"')) return 'r-sell';
  if (s.includes('"neutral"') || s.includes('"ew"') || s.includes('"equal-weight"') || s.includes('"hold"')) return 'r-hold';
  return '';
}

function getTitle(e) {
  return e.company || e.company_name || e.Company || e.ticker || e.company_ticker || e['Company ticker+name'] || e['Company Ticker+Name'] || e.name || 'Unknown';
}

function getRating(e) {
  return e.rating || e.Rating || '';
}

function getTP(e) {
  return e.tp || e.target_price || e.price_target || e.TP || '';
}

function getBroker(e) {
  return e.broker || e.Broker || e.broker_source || '';
}

function getDate(e) {
  return e.date || e.Date || e.report_date || '';
}

function flattenObj(obj, prefix) {
  let lines = [];
  if (!obj) return lines;
  for (const [k,v] of Object.entries(obj)) {
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      lines.push(...flattenObj(v, prefix ? prefix+'.'+k : k));
    } else if (Array.isArray(v)) {
      lines.push((prefix?prefix+'.':'')+k+': '+v.join(', '));
    } else if (v !== null && v !== undefined && v !== '') {
      lines.push((prefix?prefix+'.':'')+k+': '+v);
    }
  }
  return lines;
}

function getKeyNotes(e) {
  if (e.key_notes) {
    if (Array.isArray(e.key_notes)) return e.key_notes.join(' ');
    return String(e.key_notes);
  }
  return '';
}

function renderEntry(e, q) {
  const title = getTitle(e);
  const rating = getRating(e);
  const tp = getTP(e);
  const broker = getBroker(e);
  const date = getDate(e);
  const rc = getRatingClass(e);
  const notes = getKeyNotes(e);
  
  // Build detail view
  const details = flattenObj(e, '');
  
  let html = '<div class="entry" onclick="this.classList.toggle('expanded')">';
  html += '<div class="entry-header">';
  html += '<div><span class="entry-title">'+hl(title,q)+'</span>';
  if (broker) html += ' <span class="entry-meta">'+hl(broker,q)+'</span>';
  if (date) html += ' <span class="entry-meta">'+date+'</span>';
  html += '</div>';
  html += '<div>';
  if (rating) html += '<span class="entry-rating '+rc+'">'+hl(rating,q)+'</span> ';
  if (tp) html += '<span style="color:var(--yellow);font-size:0.8em">TP: '+tp+'</span>';
  html += '</div></div>';
  if (notes) html += '<div class="entry-notes">'+hl(notes,q)+'</div>';
  html += '<div class="entry-detail">'+details.map(d=>hl(d,q)).join('\n')+'</div>';
  html += '</div>';
  return html;
}

function hl(text, q) {
  if (!q || !text) return text;
  const words = q.split(/\s+/).filter(w=>w.length>0);
  let result = String(text);
  words.forEach(w => {
    const re = new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

function search(q) {
  const ql = q.toLowerCase();
  let filtered = DATA;
  if (ql.trim()) {
    const words = ql.split(/\s+/).filter(w=>w.length>0);
    filtered = DATA.filter(e => {
      const s = JSON.stringify(e).toLowerCase();
      return words.every(w => s.includes(w));
    });
  }
  document.getElementById('s-shown').textContent = filtered.length;
  const container = document.getElementById('results');
  if (filtered.length === 0) {
    container.innerHTML = '<p style="color:#8b949e;text-align:center;padding:40px">No results found</p>';
    return;
  }
  container.innerHTML = filtered.map(e => renderEntry(e, q)).join('');
}

document.getElementById('searchBox').addEventListener('input', function() { search(this.value); });
search('');
</script>
